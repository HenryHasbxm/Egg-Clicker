<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Egg Clicker Game</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 40px;
      background: linear-gradient(to bottom, #fceabb, #f8b500);
      color: #333;
      overflow-x: hidden;
      user-select: none; /* Prevents text highlighting while clicking fast */
    }
    h1 {
      font-size: 3em;
      margin-bottom: 20px;
    }
    .egg-container {
      position: relative;
      width: 120px;
      height: 160px;
      margin: 40px auto;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .egg-container:active {
      transform: scale(0.95);
    }
    .egg {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 50%, #fff 0%, #f4f4f4 100%);
      border-radius: 50% 50% 45% 45%;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #555;
    }
    /* Skin Classes */
    .egg.sparkle { box-shadow: 0 0 20px 5px #e0f7fa; }
    .egg.flame { background: linear-gradient(to top, #ff7043, #ffe0b2); }
    .egg.rainbow { background: linear-gradient(135deg, red, orange, yellow, green, blue, indigo, violet); }
    .egg.crystal { background: linear-gradient(to top left, #e1f5fe, #b3e5fc); border: 2px solid #81d4fa; }
    .egg.golden { background: linear-gradient(to top, #fff176, #fdd835); box-shadow: 0 0 20px 5px #ffeb3b; }

    .stats-container {
      background: rgba(255, 255, 255, 0.3);
      padding: 15px;
      border-radius: 15px;
      display: inline-block;
      margin-bottom: 20px;
    }
    .stat { font-size: 20px; margin: 5px; }

    .nav-buttons { margin-top: 20px; }
    button {
      font-size: 16px;
      padding: 12px 24px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #2196F3;
      color: white;
      box-shadow: 0 4px 0 #1976D2;
      transition: all 0.1s;
    }
    button:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #1976D2;
    }
    .rebirth-btn { background-color: #FF5722; box-shadow: 0 4px 0 #E64A19; }

    /* Modal (Popup) Styling */
    .modal {
      display: none;
      position: fixed;
      z-index: 100;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
    }
    .modal-content {
      background-color: #fff;
      margin: 10% auto;
      padding: 25px;
      border-radius: 20px;
      width: 80%;
      max-width: 450px;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .close-btn {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
      color: #888;
    }
    .shop-item {
      display: block;
      width: 100%;
      margin: 10px 0;
      text-align: left;
    }

    .floating-egg {
      position: absolute;
      font-size: 24px;
      font-weight: bold;
      color: #2e7d32;
      pointer-events: none;
      animation: floatUp 0.8s ease-out forwards;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-100px); }
    }
  </style>
</head>
<body>

  <h1>Egg Clicker</h1>

  <div class="stats-container">
    <div class="stat" id="score">Eggs: 0</div>
    <div class="stat" id="click-power">Per Click: 1</div>
    <div class="stat" id="passive-earnings">Passive: 0/sec</div>
    <div id="rebirths" style="font-weight: bold;">Rebirths: 0</div>
  </div>

  <div class="egg-container" onclick="clickEgg(event)">
    <div class="egg" id="animated-egg">CLICK ME</div>
  </div>

  <div class="nav-buttons">
    <button onclick="openModal('upgradeModal')">Upgrades</button>
    <button onclick="openModal('inventoryModal')">Inventory</button>
    <button onclick="openModal('creditsModal')">Credits</button>
  </div>

  <div id="upgradeModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal('upgradeModal')">&times;</span>
      <h2>Upgrades</h2>
      <button class="shop-item" onclick="upgradeClick()">Upgrade Click (50 Eggs)</button>
      <button class="shop-item" onclick="upgradePassive()">Passive Income (100 Eggs)</button>
      <button class="shop-item" onclick="buyChicken()">Buy Chicken (200 Eggs)</button>
      <hr>
      <button class="rebirth-btn shop-item" onclick="rebirth()">Rebirth (Reset for Multiplier)</button>
    </div>
  </div>

  <div id="inventoryModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal('inventoryModal')">&times;</span>
      <h2>Inventory</h2>
      <p>Select a shell (1,000 Eggs each):</p>
      <button class="shop-item" onclick="confirmEquip('sparkle')">✨ Sparkle Shell (+1/sec)</button>
      <button class="shop-item" onclick="confirmEquip('flame')">🔥 Flame Shell (+5% Click)</button>
      <button class="shop-item" onclick="confirmEquip('rainbow')">🌈 Rainbow Shell (+10% Passive)</button>
      <button class="shop-item" onclick="confirmEquip('crystal')">💎 Crystal Shell (+3/sec)</button>
      <button class="shop-item" onclick="confirmEquip('golden')">🥇 Golden Shell (+3 Click)</button>
    </div>
  </div>

  <div id="creditsModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal('creditsModal')">&times;</span>
      <h2>Credits</h2>
      <p><strong>Everything by:</strong> Henry Lin</p>
      <p>Concept, Design, and Dev: Henry Lin 🥚✨</p>
    </div>
  </div>

  <script>
    let eggs = 0;
    let eggsPerClick = 1;
    let passiveIncome = 0;
    let chickens = 0;
    let rebirthCount = 0;
    let ownedItems = {};

    function updateScore() {
      document.getElementById('score').textContent = `Eggs: ${eggs}`;
      document.getElementById('click-power').textContent = `Per Click: ${eggsPerClick}`;
      document.getElementById('passive-earnings').textContent = `Passive: ${passiveIncome}/sec`;
      document.getElementById('rebirths').textContent = `Rebirths: ${rebirthCount}`;
    }

    // Modal Controls
    function openModal(id) { document.getElementById(id).style.display = 'block'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // Close on outside click
    window.onclick = function(event) {
      if (event.target.className === 'modal') {
        event.target.style.display = "none";
      }
    }

    function clickEgg(event) {
      eggs += eggsPerClick;
      updateScore();
      
      // Floating text effect
      const span = document.createElement('span');
      span.textContent = "+" + eggsPerClick;
      span.className = 'floating-egg';
      span.style.left = event.clientX + 'px';
      span.style.top = event.clientY + 'px';
      document.body.appendChild(span);
      setTimeout(() => span.remove(), 800);
    }

    function upgradeClick() {
      if (eggs >= 50) { eggs -= 50; eggsPerClick++; updateScore(); } 
      else { alert("Not enough eggs!"); }
    }

    function upgradePassive() {
      if (eggs >= 100) { eggs -= 100; passiveIncome++; updateScore(); } 
      else { alert("Not enough eggs!"); }
    }

    function buyChicken() {
      if (eggs >= 200) { eggs -= 200; chickens++; passiveIncome += 2; updateScore(); } 
      else { alert("Not enough eggs!"); }
    }

    function confirmEquip(item) {
      if (!ownedItems[item] && eggs < 1000) {
        alert("Not enough eggs!");
        return;
      }
      if (confirm("Equip this shell?")) {
        if (!ownedItems[item]) { eggs -= 1000; ownedItems[item] = true; }
        applyItemEffects(item);
        document.getElementById('animated-egg').className = `egg ${item}`;
        updateScore();
        closeModal('inventoryModal');
      }
    }

    function applyItemEffects(item) {
      if (item === 'sparkle') passiveIncome += 1;
      if (item === 'flame') eggsPerClick = Math.ceil(eggsPerClick * 1.05);
      if (item === 'rainbow') passiveIncome = Math.ceil(passiveIncome * 1.1);
      if (item === 'crystal') passiveIncome += 3;
      if (item === 'golden') eggsPerClick += 3;
    }

    function rebirth() {
      if (eggs < 1000 && rebirthCount === 0) {
        alert("You need at least 1,000 eggs to rebirth!");
        return;
      }
      eggs = 0;
      eggsPerClick = 5;
      passiveIncome = 2;
      rebirthCount++;
      updateScore();
      closeModal('upgradeModal');
      alert('Rebirth complete! Stats boosted.');
    }

    setInterval(() => {
      eggs += passiveIncome;
      updateScore();
    }, 1000);

    updateScore();
  </script>
</body>
</html>
